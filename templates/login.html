{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h2>Login</h2>

    <form method="POST">
        <label>Username
            <input type="text" name="username" required>
        </label>
        <label>Password
            <input type="password" name="password" required>
        </label>

        <button type="submit">Register</button>
    </form>
</div>

{%  endblock %}
