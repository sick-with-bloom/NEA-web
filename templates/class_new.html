{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="card">
        <h2>Create New Class</h2>

        <form method="POST">
            <label>
                Course Code: {{ course_id }}
            </label>

            <label>Block
                <select name="block">
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                </select>
            </label>

            <label>Room
                <select name="room">
                    {% for room in room_list %}
                        <option value="{{ room[0] }}">Room {{ room[0] }}</option>
                    {% endfor %}
                </select>
            </label>

            <label>Teacher
                <select name="teacher">
                    {% for staff in staff_list %}
                        <option value="{{ staff[0] }}">{{ staff[2] }} {{ staff[1] }}</option>
                    {% endfor %}
                </select>

            </label>

            <button type="submit">Create</button>
        </form>
    </div>
</div>

{%  endblock %}
